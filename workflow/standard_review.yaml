name: standard_pre_submission_review
version: v1-pre2
description: Balanced workflow for normal pre-submission review.
inputs:
  packet_manifest: review_packet/manifest.json
steps:
- id: paper_map
  prompt: prompts/01_paper_map.md
  output: outputs/01_paper_map.md
- id: claim_evidence
  prompt: prompts/02_claim_evidence_matrix.md
  output: outputs/02_claim_evidence_matrix.md
- id: prior_work_retrieval
  prompt: prompts/37_prior_work_retrieval.md
  output: outputs/03_prior_work_retrieval.md
- id: novelty_related_work
  prompt: prompts/04_novelty_related_work_reviewer.md
  output: outputs/independent/novelty_related_work_review.md
- id: method_technical_validity
  prompt: prompts/05_method_technical_validity_reviewer.md
  output: outputs/independent/method_technical_validity_review.md
- id: experiment_evidence
  prompt: prompts/06_experiment_evidence_reviewer.md
  output: outputs/independent/experiment_evidence_review.md
- id: visual_figure_review
  prompt: prompts/25_visual_figure_reviewer.md
  output: outputs/independent/visual_figure_review.md
  uses_visual_assets: true
- id: citation_claim_auditor
  prompt: prompts/30_citation_claim_auditor.md
  output: outputs/validation/citation_claim_audit.md
- id: critical_problem_review
  prompt: prompts/32_critical_problem_reviewer.md
  output: outputs/diagnostics/critical_problem_review.md
- id: meta_review
  prompt: prompts/11_meta_reviewer.md
  output: final/meta_review.md
- id: patch_plan
  prompt: prompts/15_revision_patch_planner.md
  output: final/patch_plan.md
validation:
  script: scripts/validate_review_outputs.py
  outputs:
  - final/meta_review.md
  - final/patch_plan.md
