- id: severity_calibrator
  prompt: prompts/21_severity_calibrator.md
  output: outputs/validation/severity_calibration.md
- id: coverage_auditor
  prompt: prompts/22_coverage_auditor.md
  output: outputs/validation/coverage_audit.md
- id: review_quality
  prompt: prompts/13_review_quality_auditor.md
  output: outputs/validation/review_quality_audit.md
- id: review_revision_pass
  prompt: prompts/27_review_revision_pass.md
  output: outputs/validation/review_revision_pass.md
- id: figure_table_evidence_matrix_review
  prompt: prompts/29_figure_table_evidence_matrix_reviewer.md
  output: outputs/validation/figure_table_evidence_matrix_review.md
