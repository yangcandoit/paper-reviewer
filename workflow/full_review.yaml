- id: criticality_calibrator
  prompt: prompts/26_criticality_calibrator.md
  output: outputs/validation/criticality_calibration.md
- id: critical_problem_review
  prompt: prompts/32_critical_problem_reviewer.md
  output: outputs/diagnostics/critical_problem_review.md
- id: response_strategy_review
  prompt: prompts/35_response_strategy_reviewer.md
  output: final/response_strategy_review.md
- id: blind_bias_guard
  prompt: prompts/31_blind_bias_guard.md
  output: outputs/validation/blind_bias_guard.md
- id: meta_review
  prompt: prompts/11_meta_reviewer.md
  output: final/meta_review.md
- id: rebuttal_simulation
  prompt: prompts/14_rebuttal_simulator.md
  output: final/rebuttal_simulation.md
- id: patch_plan
  prompt: prompts/15_revision_patch_planner.md
  output: final/patch_plan.md
validation:
  script: scripts/validate_review_outputs.py
  outputs:
  - final/meta_review.md
  - final/patch_plan.md
