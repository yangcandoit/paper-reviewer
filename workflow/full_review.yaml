- id: visual_figure_review
  prompt: prompts/25_visual_figure_reviewer.md
  output: outputs/independent/visual_figure_review.md
  uses_visual_assets: true
- id: writing_structure
  prompt: prompts/08_writing_structure_reviewer.md
  output: outputs/independent/writing_structure_review.md
- id: compliance_reproducibility_ethics
  prompt: prompts/10_compliance_reproducibility_ethics_reviewer.md
