- id: prompt_injection_sanitizer
  prompt: prompts/16_prompt_injection_sanitizer.md
  output: outputs/00_prompt_injection_sanitizer.md
- id: paper_map
  prompt: prompts/01_paper_map.md
  output: outputs/01_paper_map.md
- id: claim_evidence
  prompt: prompts/02_claim_evidence_matrix.md
  output: outputs/02_claim_evidence_matrix.md
- id: editor_venue_fit
  prompt: prompts/03_editor_venue_fit_reviewer.md
  output: outputs/independent/editor_venue_fit_review.md
- id: prior_work_retrieval
  prompt: prompts/37_prior_work_retrieval.md
  output: outputs/03_prior_work_retrieval.md
- id: novelty_related_work
  prompt: prompts/04_novelty_related_work_reviewer.md
