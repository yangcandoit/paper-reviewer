name: quick_pre_submission_review
version: v1-pre2
description: Fast risk scan for early manuscript triage.
inputs:
  packet_manifest: review_packet/manifest.json
steps:
- id: paper_map
  prompt: prompts/01_paper_map.md
  output: outputs/01_paper_map.md
- id: claim_evidence
  prompt: prompts/02_claim_evidence_matrix.md
  output: outputs/02_claim_evidence_matrix.md
- id: critical_problem_review
  prompt: prompts/32_critical_problem_reviewer.md
  output: outputs/diagnostics/critical_problem_review.md
- id: meta_review
  prompt: prompts/11_meta_reviewer.md
  output: final/meta_review.md
- id: patch_plan
  prompt: prompts/15_revision_patch_planner.md
  output: final/patch_plan.md
validation:
  script: scripts/validate_review_outputs.py
  outputs:
  - final/meta_review.md
  - final/patch_plan.md
